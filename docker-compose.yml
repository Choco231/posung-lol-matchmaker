services:
  backend:
    build: ./backend
    image: loltc-backend
    container_name: loltc-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./frontend/coupon:/coupon
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1

  frontend:
    build: ./frontend
    image: loltc-frontend
    container_name: loltc-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - USE_DOCKER=true
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: loltc-cloudflared
    restart: unless-stopped
    command:
      - "tunnel"
      - "--no-autoupdate"
      - "run"
      - "--token"
      - "${CLOUDFLARE_TUNNEL_TOKEN}"
    depends_on:
      - frontend
